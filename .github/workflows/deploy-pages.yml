name: Deploy Frontend ke GitHub Pages

# Build frontend/ (Tailwind CSS + Service Worker) lalu publish ke GitHub Pages
# setiap push ke main -- backend (Google Apps Script) TIDAK ikut ter-deploy
# lewat workflow ini, itu proses terpisah lewat script.google.com/clasp
# (lihat docs/01-SETUP-BACKEND.md).
on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "scripts/gen-sw.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS (Tailwind)
        run: npm run build:css

      - name: Generate Service Worker
        run: npm run build:sw

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
