<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kasir Barber & Warkop</title>
  <meta name="description" content="Aplikasi kasir modern untuk Barber & Warkop dalam satu sistem." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82f6'/%3E%3Cstop offset='1' stop-color='%23f97316'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='54' text-anchor='middle' fill='white'%3E%E2%9C%82%3C/text%3E%3C/svg%3E" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kasir B&W" />

  <!-- Terapkan tema sebelum render pertama supaya tidak ada flash putih/hitam (FOUC). -->
  <script>
    (function () {
      try {
        var raw = localStorage.getItem('kbw_theme');
        var mode = raw ? JSON.parse(raw) : 'system';
        var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', isDark);
      } catch (e) { /* localStorage tidak tersedia (mode privat, dsb) -- pakai default light */ }
    })();
  </script>

  <link rel="stylesheet" href="./assets/css/app.css" />
</head>
<body>
  <div id="splash" class="fixed inset-0 z-50 flex flex-col items-center justify-center gap-3 bg-slate-50 dark:bg-slate-950">
    <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-barber-500 to-warkop-500 text-2xl font-bold text-white shadow-xl animate-pulse">
      ✂
    </div>
    <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">Memuat Kasir Barber & Warkop…</p>
  </div>

  <div id="app"></div>

  <!-- Chart.js, jsPDF & autoTable di-vendor lokal (bukan CDN) supaya app tetap berfungsi offline sebagai PWA. -->
  <script src="./assets/js/vendor/chart.umd.min.js"></script>
  <script src="./assets/js/vendor/jspdf.umd.min.js"></script>
  <script src="./assets/js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
